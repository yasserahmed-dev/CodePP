{% extends 'base_auth.html' %}
{% load static %}

{% block title %}حذف الحساب | Code++{% endblock %}

{% block content %}
<div class="container">
  <div class="card">
    <h1>حذف الحساب</h1>
    <p>⚠️ عند حذف الحساب سيتم فقدان جميع البيانات بما فيها الشهادات والدورات. يرجى التأكد.</p>

    <form method="POST" action="{% url 'delete_account_request' %}">
      {% csrf_token %}
      <button type="submit" class="btn">إرسال كود التحقق إلى بريدي الإلكتروني</button>
    </form>

    <div class="links">
      <a href="{% url 'profile' %}">العودة إلى الملف الشخصي</a>
    </div>
  </div>
</div>

<style>
:root {
  --primary: #e11d48;
  --white: #fff;
  --radius: 16px;
  --shadow: 0 20px 50px rgba(225, 29, 72, 0.15);
  --font: 'Poppins', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font); }

body {
  background-image: url("{% static 'images/bg.png' %}");
  background-size: cover;
  background-repeat: no-repeat;
  background-position: center;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container { width: 100%; display: flex; justify-content: center; }

.card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 2.5rem 2rem;
  width: 450px;
  max-width: 90%;
  text-align: center;
}

.card h1 { 
  margin-bottom: 1rem;
  background: linear-gradient(150deg, #e11d48, #b91c1c);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-size: 28px;
}

.card p {
  margin-bottom: 1.5rem;
  color: #555;
}

.btn {
  background: linear-gradient(135deg, #e11d48, #b91c1c);
  color: var(--white);
  border: none;
  border-radius: 50px;
  padding: 0.8rem;
  width: 80%;
  font-size: 1rem;
  cursor: pointer;
  box-shadow: 0 5px 20px rgba(185, 28, 28, 0.4);
  transition: 0.3s;
}

.btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 25px rgba(185, 28, 28, 0.5);
}

.links { margin-top: 1.2rem; }
.links a { color: #e11d48; text-decoration: none; }
.links a:hover { text-decoration: underline; }

@media (max-width: 480px) {
  .card { width: 95%; padding: 1.5rem; }
  .card h1 { font-size: 24px; }
}
</style>
{% endblock %}
