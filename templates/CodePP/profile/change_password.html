{% extends 'base_auth.html' %}
{% load static %}

{% block title %}تغيير كلمة المرور | Code++{% endblock %}

{% block content %}
<div class="container">
  <div class="password-card">
    <h1>تغيير كلمة المرور</h1>

    <form method="POST" action="{% url 'change_password' %}">
      {% csrf_token %}

      <div class="input-group">
        <span class="icon"><i class="fa-solid fa-lock"></i></span>
        <input type="password" name="current_password" placeholder="كلمة المرور الحالية" required>
        <span class="toggle"><i class="fa-solid fa-eye"></i></span>
      </div>

      <div class="input-group">
        <span class="icon"><i class="fa-solid fa-lock"></i></span>
        <input type="password" name="new_password" placeholder="كلمة المرور الجديدة" required>
        <span class="toggle"><i class="fa-solid fa-eye"></i></span>
      </div>

      <div class="input-group">
        <span class="icon"><i class="fa-solid fa-lock"></i></span>
        <input type="password" name="confirm_password" placeholder="تأكيد كلمة المرور الجديدة" required>
        <span class="toggle"><i class="fa-solid fa-eye"></i></span>
      </div>

      <button type="submit" class="btn">حفظ التغيير</button>

      <div class="links">
        <a href="{% url 'profile' %}">العودة إلى الملف الشخصي</a>
      </div>
    </form>
  </div>
</div>

<style>
:root {
  --primary: #3b82f6;
  --white: #fff;
  --text: #333;
  --radius: 16px;
  --shadow: 0 20px 50px rgba(59, 130, 246, 0.15);
  --font: 'Poppins', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font); }

body {
  background-image: url("{% static 'images/bg.png' %}");
  background-size: cover;
  background-repeat: no-repeat;
  background-position: center;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container { width: 100%; display: flex; justify-content: center; }

.password-card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 2.5rem 2rem;
  width: 500px;
  max-width: 90%;
  text-align: center;
}

.password-card h1 {
  margin-bottom: 1.5rem;
  background: linear-gradient(150deg, #3b82f6, #2563eb);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-size: 28px;
}

.input-group {
  position: relative;
  margin-bottom: 1.2rem;
}

.input-group input {
  width: 100%;
  padding: 0.8rem 2.5rem;
  border: 1px solid #d0d7e2;
  border-radius: 10px;
  outline: none;
  font-size: 1rem;
  transition: 0.2s;
}

.input-group input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 4px rgba(59, 130, 246, 0.3);
}

.icon {
  position: absolute;
  top: 50%;
  left: 0.8rem;
  transform: translateY(-50%);
  font-size: 1.2rem;
  color: #9aa5b1;
}

.toggle {
  position: absolute;
  top: 50%;
  right: 0.8rem;
  transform: translateY(-50%);
  cursor: pointer;
  font-size: 1.1rem;
  color: #9aa5b1;
}

.btn {
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  color: var(--white);
  border: none;
  border-radius: 50px;
  padding: 0.8rem;
  width: 50%;
  font-size: 1rem;
  cursor: pointer;
  box-shadow: 0 5px 20px rgba(37, 99, 235, 0.4);
  transition: 0.3s;
}

.btn:hover {
  transform: translateY(-5px);
  box-shadow: 0 8px 25px rgba(37, 99, 235, 0.5);
}

.links {
  display: flex;
  justify-content: center;
  margin-top: 1rem;
  font-size: 0.9rem;
}

.links a {
  color: var(--primary);
  text-decoration: none;
  transition: 0.2s;
}

.links a:hover {
  text-decoration: underline;
}

@media (max-width: 480px) {
  .password-card { width: 95%; padding: 1.5rem; }
  .password-card h1 { font-size: 24px; }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const toggles = document.querySelectorAll('.toggle');
  toggles.forEach(toggle => {
    toggle.addEventListener('click', function() {
      const input = this.previousElementSibling;
      if (input.type === 'password') {
        input.type = 'text';
        this.innerHTML = '<i class="fa-solid fa-eye-slash"></i>';
      } else {
        input.type = 'password';
        this.innerHTML = '<i class="fa-solid fa-eye"></i>';
      }
    });
  });
});
</script>
{% endblock %}
