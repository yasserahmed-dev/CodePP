{% extends 'base_auth.html' %}
{% load static %}

{% block title %}إنشاء حساب{% endblock %}

{% block content %}
<div class="container">
  <div class="signup-card">
    <h1>إنشاء حساب جديد</h1>

    <form method="POST" action="{% url 'signup' %}">
      {% csrf_token %}

      <div class="input-group">
        <span class="icon"><i class="fa-solid fa-user"></i></span>
        <input type="text" name="first_name" placeholder="الاسم الشخصي" autocomplete="name" required>
      </div>

      <div class="input-group">
        <span class="icon"><i class="fa-solid fa-user"></i></span>
        <input type="text" name="last_name" placeholder="الاسم العائلي" autocomplete="name" required>
      </div>

      <div class="input-group">
        <span class="icon"><i class="fa-solid fa-envelope"></i></span>
        <input type="email" name="email" placeholder="البريد الإلكتروني" autocomplete="email" required>
      </div>

      <div class="input-group">
        <span class="icon"><i class="fa-solid fa-lock"></i></span>
        <input type="password" name="password1" placeholder="كلمة المرور" autocomplete="new-password" required>
      </div>

      <div class="input-group">
        <span class="icon"><i class="fa-solid fa-lock"></i></span>
        <input type="password" name="password2" placeholder="تأكيد كلمة المرور" autocomplete="new-password" required>
      </div>

      <div class="terms">
        <input type="checkbox" id="agreeTerms" name="terms" required>
        <label for="agreeTerms">أوافق على الشروط والأحكام</label>
      </div>

      <button type="submit" class="btn">إنشاء الحساب</button>

      <div class="signup">
        <span>لديك حساب بالفعل؟</span>
        <a href="{% url 'login' %}">تسجيل الدخول</a>
      </div>
    </form>
  </div>
</div>

<style>
:root {
  --primary: #3b82f6;
  --white: #fff;
  --text: #333;
  --radius: 16px;
  --shadow: 0 20px 50px rgba(59, 130, 246, 0.15);
  --font: 'Poppins', sans-serif;
}

* { margin:0; padding:0; box-sizing: border-box; font-family: var(--font); }

body {
  background-image: url("{% static 'images/bg.png' %}");
  background-size: cover;
  background-repeat: no-repeat;
  background-position: center;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  width: 100%;
  display: flex;
  justify-content: center;
}

.signup-card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 2.5rem 2rem;
  width: 500px;
  max-width: 90%;
  text-align: center;
}

.signup-card h1 {
  margin-bottom: 1.5rem;
  background: linear-gradient(150deg, #3b82f6, #2563eb);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-size: 28px;
}

.input-group {
  position: relative;
  margin-bottom: 1.2rem;
}

.input-group input {
  width: 100%;
  padding: 0.8rem 2.5rem;
  border: 1px solid #d0d7e2;
  border-radius: 10px;
  outline: none;
  font-size: 1rem;
  transition: 0.2s;
}

.input-group input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 4px rgba(59, 130, 246, 0.3);
}

.icon {
  position: absolute;
  top: 50%;
  left: 0.8rem;
  transform: translateY(-50%);
  font-size: 1.2rem;
  color: #9aa5b1;
}

.toggle {
  position: absolute;
  top: 50%;
  right: 0.8rem;
  transform: translateY(-50%);
  cursor: pointer;
  font-size: 1.1rem;
  color: #9aa5b1;
}

.btn {
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  color: var(--white);
  border: none;
  border-radius: 50px;
  padding: 0.8rem;
  width: 50%;
  font-size: 1rem;
  cursor: pointer;
  box-shadow: 0 5px 20px rgba(37, 99, 235, 0.4);
  transition: 0.3s;
}

.btn:hover {
  transform: translateY(-5px);
  box-shadow: 0 8px 25px rgba(37, 99, 235, 0.5);
}

.terms {
  display:flex;
  align-items:center;
  gap:8px;
  margin:10px 0 18px;
  font-size:14px;
  color:#344055;
  justify-content:flex-start;
}

.signup {
  display: flex;
  justify-content: center;
  margin-top: 1rem;
}

.signup a {
  color: var(--primary);
  text-decoration: none;
  margin-left: 5px;
}

/* Responsive Design */
@media (max-width: 768px) {
  .signup-card { width: 90%; padding: 2rem 1.5rem; }
  .signup-card h1 { font-size: 26px; }
  .btn { width: 70%; }
}

@media (max-width: 480px) {
  .signup-card { width: 95%; padding: 1.5rem 1rem; }
  .signup-card h1 { font-size: 22px; }
  .input-group input { padding: 0.7rem 2rem; font-size: 0.9rem; }
  .btn { width: 80%; font-size: 0.9rem; }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const passwordFields = document.querySelectorAll('.input-group input[type="password"]');

  passwordFields.forEach(input => {
    const toggle = document.createElement('span');
    toggle.classList.add('toggle');
    toggle.innerHTML = '<i class="fa-solid fa-eye"></i>';
    input.parentNode.appendChild(toggle);

    toggle.addEventListener('click', function() {
      if (input.type === 'password') {
        input.type = 'text';
        this.innerHTML = '<i class="fa-solid fa-eye-slash"></i>';
      } else {
        input.type = 'password';
        this.innerHTML = '<i class="fa-solid fa-eye"></i>';
      }
    });
  });
});
</script>
{% endblock %}
