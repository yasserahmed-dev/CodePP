{% extends 'base_auth.html' %}
{% load static %}

{% block title %}إعادة تعيين كلمة المرور | Code++{% endblock %}

{% block content %}
<div class="container">
  <div class="login-card">
    <h1>إعادة تعيين كلمة المرور</h1>
    <p class="subtitle">أدخل كلمة المرور الجديدة لتحديث حسابك</p>

    <form method="POST" action="{% url 'reset_password_form' %}">
      {% csrf_token %}
      
      <div class="input-group">
        <span class="icon"><i class="fa-solid fa-lock"></i></span>
        <input type="password" name="new_password" id="newPassword" placeholder="كلمة المرور الجديدة" required>
        <i class="fa-solid fa-eye toggle" id="toggleNew"></i>
      </div>

      <div class="input-group">
        <span class="icon"><i class="fa-solid fa-lock"></i></span>
        <input type="password" name="confirm_password" id="confirmPassword" placeholder="تأكيد كلمة المرور" required>
        <i class="fa-solid fa-eye toggle" id="toggleConfirm"></i>
      </div>

      <button type="submit" class="btn">حفظ</button>
    </form>
  </div>
</div>

<style>
:root {
  --primary: #3b82f6;
  --light-bg: #eaf3ff;
  --white: #fff;
  --radius: 16px;
  --shadow: 0 20px 50px rgba(59, 130, 246, 0.15);
  --font: 'Poppins', sans-serif;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: var(--font);
}

body {
  background-image: url("{% static 'images/bg.png' %}");
  background-size: cover;
  background-repeat: no-repeat;
  background-position: center;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  width: 100%;
  display: flex;
  justify-content: center;
}

.login-card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 2.5rem 2rem;
  width: 500px;
  max-width: 90%;
  text-align: center;
}

.login-card h1 {
  margin-bottom: 1rem;
  background: linear-gradient(150deg, #3b82f6, #2563eb);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-size: 28px;
}

.subtitle {
  color: #586272;
  font-size: 15px;
  margin-bottom: 1.5rem;
}

.input-group {
  position: relative;
  margin-bottom: 1.2rem;
}

.input-group input {
  width: 100%;
  padding: 0.8rem 2.5rem;
  border: 1px solid #d0d7e2;
  border-radius: 10px;
  outline: none;
  font-size: 1rem;
  transition: 0.2s;
}

.input-group input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 4px rgba(59, 130, 246, 0.3);
}

.icon {
  position: absolute;
  top: 50%;
  left: 0.8rem;
  transform: translateY(-50%);
  font-size: 1.2rem;
  color: #9aa5b1;
}

.toggle {
  position: absolute;
  top: 50%;
  right: 0.8rem;
  transform: translateY(-50%);
  font-size: 1.1rem;
  color: #9aa5b1;
  cursor: pointer;
}

.btn {
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  color: var(--white);
  border: none;
  border-radius: 50px;
  padding: 0.8rem;
  width: 50%;
  font-size: 1rem;
  cursor: pointer;
  box-shadow: 0 5px 20px rgba(37, 99, 235, 0.4);
  transition: 0.3s;
}

.btn:hover {
  transform: translateY(-5px);
  box-shadow: 0 8px 25px rgba(37, 99, 235, 0.5);
}

.links {
  display: flex;
  justify-content: center;
  margin-top: 1.2rem;
  font-size: 0.9rem;
}

.links a {
  color: var(--primary);
  text-decoration: none;
  transition: 0.2s;
}

.links a:hover {
  text-decoration: underline;
}

/* Responsive */
@media (max-width: 768px) {
  .login-card {
    width: 90%;
    padding: 2rem 1.5rem;
  }

  .btn {
    width: 70%;
  }

  .links {
    flex-direction: column;
    gap: 0.6rem;
  }
}
</style>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const toggleNew = document.getElementById("toggleNew");
  const toggleConfirm = document.getElementById("toggleConfirm");
  const newPassword = document.getElementById("newPassword");
  const confirmPassword = document.getElementById("confirmPassword");

  toggleNew.addEventListener("click", () => {
    const type = newPassword.getAttribute("type") === "password" ? "text" : "password";
    newPassword.setAttribute("type", type);
    toggleNew.classList.toggle("fa-eye-slash");
  });

  toggleConfirm.addEventListener("click", () => {
    const type = confirmPassword.getAttribute("type") === "password" ? "text" : "password";
    confirmPassword.setAttribute("type", type);
    toggleConfirm.classList.toggle("fa-eye-slash");
  });
});
</script>
{% endblock %}
