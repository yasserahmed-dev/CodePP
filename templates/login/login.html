{% extends 'base_auth.html' %}
{% load static %}

{% block title %}تسجيل الدخول{% endblock %}

{% block content %}
<div class="container">
  <div class="login-card">
    <h1>تسجيل الدخول إلى <span dir="ltr">Code++</span></h1>
    <form method="POST" action="{% url 'login' %}">
      {% csrf_token %}
      
      <div class="input-group">
        <span class="icon"><i class="fa-solid fa-user"></i></span>
        <input type="email" name="email" placeholder="البريد الإلكتروني" required>
      </div>

      <div class="input-group">
        <span class="icon"><i class="fa-solid fa-lock"></i></span>
        <input type="password" name="password" placeholder="كلمة المرور" required>
      </div>

      <button type="submit" class="btn">تسجيل الدخول</button>

      <div class="links">
        
        <a href="{% url 'password_reset' %}">هل نسيت كلمة المرور؟</a>
      </div>

      <div class="signup">
        <span>ليس لديك حساب؟</span>
        <a href="{% url 'signup' %}">إنشاء حساب جديد</a>
      </div>
    </form>
  </div>
</div>
<style>
  /* إعداد الخطوط والألوان الأساسية */
:root {
  --primary: #3b82f6;
  --light-bg: #eaf3ff;
  --white: #fff;
  --text: #333;
  --radius: 16px;
  --shadow: 0 20px 50px rgba(59, 130, 246, 0.15);
  --font: 'Poppins', sans-serif;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: var(--font);
}

body {
  padding: 0;
  margin: 0;
  background-image:url("{% static 'images/bg.png' %}");
  background-size: cover;
  background-repeat: no-repeat;
  background-position: center;
  height: 100vh;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  width: 100%;
  display: flex;
  justify-content: center;
}

.login-card {
  background:rgb(255, 255, 255);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 2.5rem 2rem;
  width: 500px;
  max-width: 90%;
  height: auto;
  text-align: center;
}

.login-card h1 {
  margin-bottom: 1.5rem;
  background: linear-gradient(150deg, #3b82f6, #2563eb);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-size: 30px;
}

.input-group {
  position: relative;
  margin-bottom: 1.2rem;
}

.input-group input {
  width: 100%;
  padding: 0.8rem 2.5rem;
  border: 1px solid #d0d7e2;
  border-radius: 10px;
  outline: none;
  font-size: 1rem;
  transition: 0.2s;
}

.input-group input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 4px rgba(59, 130, 246, 0.3);
}

.icon {
  position: absolute;
  top: 50%;
  left: 0.8rem;
  transform: translateY(-50%);
  font-size: 1.2rem;
  color: #9aa5b1;
}

.toggle {
  position: absolute;
  top: 50%;
  right: 0.8rem;
  transform: translateY(-50%);
  cursor: pointer;
  font-size: 1.1rem;
  color: #9aa5b1;
}

.btn {
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  color: var(--white);
  border: none;
  border-radius: 50px;
  padding: 0.8rem;
  width: 50%;
  font-size: 1rem;
  cursor: pointer;
  box-shadow: 0 5px 20px rgba(37, 99, 235, 0.4);
  transition: 0.3s;
}

.btn:hover {
  transform: translateY(-5px);
  box-shadow: 0 8px 25px rgba(37, 99, 235, 0.5);
}

.links {
  display: flex;
  justify-content: space-between;
  margin-top: 1rem;
  font-size: 0.9rem;
}

.links * {
  color: var(--primary);
  text-decoration: none;
  transition: 0.2s;
}

.signup {
  display: flex;
  justify-content: center;
}

.signup a {
  color: var(--primary);
  text-decoration: none;
  transition: 0.2s;
}

#formMessage {
  text-align: center;
  min-height: 20px;
  transition: opacity 0.2s ease;
  opacity: 1;
  line-height: 1.2;
}

/* -------- Responsive Design -------- */
@media (max-width: 768px) {
  .login-card {
    width: 90%;
    padding: 2rem 1.5rem;
  }

  .login-card h1 {
    font-size: 26px;
  }

  .btn {
    width: 70%;
  }

  .links {
    flex-direction: column;
    gap: 0.6rem;
  }
}

@media (max-width: 480px) {
  .login-card {
    width: 95%;
    padding: 1.5rem 1rem;
  }

  .login-card h1 {
    font-size: 22px;
  }

  .input-group input {
    padding: 0.7rem 2rem;
    font-size: 0.9rem;
  }

  .btn {
    width: 80%;
    font-size: 0.9rem;
  }

  .links {
    flex-direction: column;
    align-items: center;
  }
}

</style>
{% endblock %}
